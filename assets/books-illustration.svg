<svg width="860" height="320" viewBox="0 0 860 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stack of school books</title>
  <desc id="desc">A decorative stack of school books with pencils and notebook accents.</desc>

  <defs>
    <linearGradient id="bgGlow" x1="430" y1="20" x2="430" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFECD8"/>
      <stop offset="1" stop-color="#FFF7EE"/>
    </linearGradient>
    <linearGradient id="bookOrange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E35F35"/>
      <stop offset="1" stop-color="#C24721"/>
    </linearGradient>
    <linearGradient id="bookBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4E8CBF"/>
      <stop offset="1" stop-color="#2E6A9B"/>
    </linearGradient>
    <linearGradient id="bookGold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F4BB4A"/>
      <stop offset="1" stop-color="#DB9E2D"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="820" height="280" rx="26" fill="url(#bgGlow)"/>

  <ellipse cx="430" cy="268" rx="300" ry="26" fill="#E8D8C9" fill-opacity="0.55"/>

  <rect x="205" y="220" width="450" height="28" rx="8" fill="#F7EEE3" stroke="#D9C4AE" stroke-width="2"/>

  <g transform="translate(236 176)">
    <rect width="390" height="46" rx="10" fill="url(#bookOrange)"/>
    <rect x="18" y="0" width="12" height="46" fill="#F9C9B5"/>
    <rect x="336" y="10" width="42" height="6" rx="3" fill="#F8DCCF"/>
    <rect x="336" y="20" width="42" height="6" rx="3" fill="#F8DCCF"/>
  </g>

  <g transform="translate(250 132)">
    <rect width="360" height="44" rx="10" fill="url(#bookBlue)"/>
    <rect x="18" y="0" width="14" height="44" fill="#BFD4E8"/>
    <rect x="306" y="9" width="38" height="6" rx="3" fill="#D4E3F1"/>
    <rect x="306" y="19" width="38" height="6" rx="3" fill="#D4E3F1"/>
  </g>

  <g transform="translate(275 90)">
    <rect width="310" height="42" rx="10" fill="url(#bookGold)"/>
    <rect x="14" y="0" width="12" height="42" fill="#F9E4B6"/>
    <rect x="262" y="8" width="34" height="6" rx="3" fill="#FCEBC8"/>
    <rect x="262" y="18" width="34" height="6" rx="3" fill="#FCEBC8"/>
