  <g transform="translate(620 82) rotate(18)">
    <rect width="16" height="112" rx="6" fill="#F2C24B"/>
    <polygon points="0,0 16,0 8,-14" fill="#DCA93E"/>
    <rect x="0" y="96" width="16" height="16" rx="3" fill="#EA7F55"/>
  </g>

  <g transform="translate(212 84) rotate(-14)">
    <rect width="16" height="108" rx="6" fill="#F2C24B"/>
    <polygon points="0,0 16,0 8,-14" fill="#DCA93E"/>
    <rect x="0" y="92" width="16" height="16" rx="3" fill="#EA7F55"/>
  </g>

  <g transform="translate(390 60)">
    <rect width="78" height="30" rx="6" fill="#FFF8EE" stroke="#D9C4AE" stroke-width="2"/>
    <line x1="12" y1="11" x2="66" y2="11" stroke="#C7A98D" stroke-width="2"/>
    <line x1="12" y1="18" x2="54" y2="18" stroke="#C7A98D" stroke-width="2"/>
  </g>
</svg>
