<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Course</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <h1>Add a Course</h1>
    <p>Use this page to create a new course entry.</p>
  </header>

  <main class="panel">
    <form id="courseForm" class="course-form">
      <label for="courseName">Course Name</label>
      <input id="courseName" name="courseName" type="text" placeholder="Math 101" required>

      <label for="description">Description</label>
      <input id="description" name="description" type="text" placeholder="Basic Algebra" required>

      <label for="subjectArea">Subject Area</label>
      <input id="subjectArea" name="subjectArea" type="text" placeholder="Mathematics" required>

      <label for="credits">Credits</label>
      <input id="credits" name="credits" type="number" min="1" placeholder="3" required>

      <div class="form-actions">
        <button type="submit">Add Course</button>
        <a class="secondary-link" href="manage-courses.html">View Courses</a>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
  <script src="add-course.js"></script>
</body>
</html>
